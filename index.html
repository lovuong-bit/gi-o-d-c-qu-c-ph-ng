<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GDQP 11 - Bảo vệ chủ quyền biên giới</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap"
      rel="stylesheet"
    />
    <!-- File CSS riêng -->
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="game-container" class="w-full max-w-4xl px-4">
      <!-- Màn hình bắt đầu -->
      <div
        id="start-screen"
        class="glass-card rounded-3xl p-8 md:p-12 text-center"
      >
        <div class="mb-6 flex justify-center">
          <div
            class="w-20 h-20 bg-yellow-500 rounded-full flex items-center justify-center shadow-lg animate-star"
          >
            <span class="text-4xl text-black">⭐</span>
          </div>
        </div>
        <h1
          class="text-3xl md:text-5xl font-black mb-4 tracking-tight text-yellow-500 uppercase"
        >
          QUỐC PHÒNG AN NINH 11
        </h1>
        <h2
          class="text-lg md:text-2xl font-bold mb-8 text-slate-200 uppercase tracking-wide"
        >
          BẢO VỆ CHỦ QUYỀN LÃNH THỔ,<br class="hidden md:block" />
          BIÊN GIỚI QUỐC GIA
        </h2>
        <div
          class="bg-yellow-500/10 border border-yellow-500/30 rounded-2xl p-5 mb-10"
        >
          <p class="text-sm md:text-base italic text-yellow-200">
            "Xây dựng và bảo vệ chủ quyền biên giới là trách nhiệm của toàn
            Đảng, toàn dân, toàn quân và mọi công dân."
          </p>
        </div>
        <button
          onclick="startGame()"
          class="px-10 py-4 bg-yellow-500 text-black rounded-full font-black text-lg md:text-xl hover:bg-yellow-400 transition-all shadow-xl hover:scale-105 active:scale-95 uppercase"
        >
          BẮT ĐẦU CHIẾN DỊCH
        </button>
        <div
          class="mt-8 text-xs text-slate-400 font-bold tracking-widest uppercase"
        >
          GDQP 11 - TỔ 1 - 11B11
        </div>
      </div>

      <!-- Màn hình câu hỏi -->
      <div
        id="quiz-screen"
        class="hidden glass-card rounded-3xl p-6 md:p-12 relative"
      >
        <div class="flex justify-between items-center mb-8">
          <div class="bg-black/20 p-3 rounded-xl border border-white/5">
            <span
              class="text-[10px] font-black uppercase text-yellow-500 tracking-widest block"
              >Câu hỏi</span
            >
            <div class="text-xl md:text-2xl font-black" id="question-number">
              01/20
            </div>
          </div>
          <div class="flex flex-col items-center">
            <div id="timer-text" class="text-3xl font-black text-red-500">
              15
            </div>
            <div
              class="w-24 h-2 bg-black/40 rounded-full mt-1 overflow-hidden border border-white/10"
            >
              <!-- Đã xóa inline style width: 100% để tránh lỗi VS Code -->
              <div id="timer-bar" class="h-full bg-red-500 timer-bar"></div>
            </div>
          </div>
          <div
            class="bg-black/20 p-3 rounded-xl border border-white/5 text-right"
          >
            <span
              class="text-[10px] font-black uppercase text-green-500 tracking-widest block"
              >Điểm số</span
            >
            <div
              class="text-xl md:text-2xl font-black text-green-500"
              id="current-score"
            >
              0
            </div>
          </div>
        </div>

        <div id="question-box" class="mb-10 min-h-[80px]">
          <h2
            id="question-text"
            class="text-xl md:text-2xl font-bold leading-snug"
          >
            Đang chuẩn bị nội dung chiến dịch...
          </h2>
        </div>

        <div
          id="options-container"
          class="grid grid-cols-1 md:grid-cols-2 gap-4"
        >
          <!-- Đáp án sẽ được chèn tự động -->
        </div>

        <div
          id="feedback"
          class="mt-8 text-center font-black text-xl opacity-0 h-8 uppercase italic transition-all duration-300"
        >
          -
        </div>
      </div>

      <!-- Màn hình kết quả -->
      <div
        id="result-screen"
        class="hidden glass-card rounded-3xl p-10 md:p-16 text-center"
      >
        <h2 class="text-3xl font-black mb-4 uppercase tracking-tighter">
          KẾT QUẢ CHIẾN DỊCH
        </h2>
        <div class="text-8xl font-black text-yellow-500 mb-8" id="final-score">
          0
        </div>
        <p
          id="performance-msg"
          class="text-xl font-bold mb-10 italic text-slate-300 max-w-md mx-auto"
        ></p>
        <button
          onclick="location.reload()"
          class="px-12 py-4 border-2 border-yellow-500 text-yellow-500 rounded-full font-black hover:bg-yellow-500 hover:text-black transition-all uppercase tracking-widest shadow-lg"
        >
          LÀM LẠI NHIỆM VỤ
        </button>
      </div>
    </div>

    <!-- File JavaScript riêng -->
    <script src="script.js"></script>
  </body>
</html>
